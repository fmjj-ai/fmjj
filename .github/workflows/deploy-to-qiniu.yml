name: Deploy to Qiniu CDN

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install qshell
        run: |
          wget -q https://github.com/qiniu/qshell/releases/download/v2.14.2/qshell-linux-x64-v2.14.2.zip -O /tmp/qshell.zip
          unzip -o /tmp/qshell.zip -d /tmp/
          sudo mv /tmp/qshell /usr/local/bin/
          qshell --version

      - name: Configure and upload
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        run: |
          qshell account $QINIU_ACCESS_KEY $QINIU_SECRET_KEY
          # 第一次同步（删除远端不存在于本地的文件）
          qshell sync / index.html $QINIU_BUCKET

      - name: Verify
        env:
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        run: |
          qshell listbucket2 $QINIU_BUCKET | head -20
